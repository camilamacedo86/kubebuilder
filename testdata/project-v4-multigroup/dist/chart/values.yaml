# Default values for the Kubebuilder Helm chart
# Controller Manager settings
controllerManager:
  image:
    repository: controller
    tag: latest
  replicas: 1
  args:
    - "--leader-elect"
    - "--metrics-bind-address=:8080"
    - "--health-probe-bind-address=:8081"
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
    httpGet:
      path: /healthz
      port: 8081
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    httpGet:
      path: /readyz
      port: 8081
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - "ALL"
  serviceAccountName: project-v4-multigroup-controller-manager
  terminationGracePeriodSeconds: 10
  env:
    BUSYBOX_IMAGE: busybox:1.36.1
    MEMCACHED_IMAGE: memcached:1.6.26-alpine3.19

# RBAC settings
rbac:
  create: true

# CRDs settings
crd:
  create: true


# Webhook service settings
webhook:
  create: true
  services:
    - name: missuer-v1.kb.io
      type: mutating
      path: /mutate-cert-manager-io-v1-issuer
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - cert-manager.io
          apiVersions:
            - v1
          resources:
            - issuers
    - name: mcaptain-v1.kb.io
      type: mutating
      path: /mutate-crew-testproject-org-v1-captain
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - crew.testproject.org
          apiVersions:
            - v1
          resources:
            - captains
    - name: mdestroyer-v1.kb.io
      type: mutating
      path: /mutate-ship-testproject-org-v1-destroyer
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - ship.testproject.org
          apiVersions:
            - v1
          resources:
            - destroyers
    - name: vpod-v1.kb.io
      type: validating
      path: /validate--v1-pod
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - ""
          apiVersions:
            - v1
          resources:
            - pods
    - name: vcaptain-v1.kb.io
      type: validating
      path: /validate-crew-testproject-org-v1-captain
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - crew.testproject.org
          apiVersions:
            - v1
          resources:
            - captains
    - name: vmemcached-v1alpha1.kb.io
      type: validating
      path: /validate-example-com-testproject-org-v1alpha1-memcached
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - example.com.testproject.org
          apiVersions:
            - v1alpha1
          resources:
            - memcacheds
    - name: vcruiser-v2alpha1.kb.io
      type: validating
      path: /validate-ship-testproject-org-v2alpha1-cruiser
      failurePolicy: Fail
      sideEffects: None
      admissionReviewVersions:
        - v1
      rules:
        - operations:
            - CREATE
            - UPDATE
          apiGroups:
            - ship.testproject.org
          apiVersions:
            - v2alpha1
          resources:
            - cruisers


# Prometheus monitoring settings
prometheus:
  create: false

# CertManager settings for certificates
certmanager:
  create: false

# Network policies
networkPolicy:
  create: false
